services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: tune
      POSTGRES_PASSWORD: tune
      POSTGRES_DB: tune
    ports:
      - "5432:5432"
    volumes:
      - tune_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tune"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tune_pgdata:
