file_types: [gtf, gff, gff3]
label: "Genome Annotation (GTF/GFF)"

base_fields:
  - key: project
    label: "Project (or 'reference' if shared reference file)"
    required: true
    type: string
  - key: notes
    label: "Notes"
    required: false
    type: string

type_fields:
  - key: genome_build
    label: "Genome build"
    required: true
    type: string
    hint: "e.g. hg38, GRCh38, mm10"
  - key: annotation_source
    label: "Annotation source"
    required: true
    type: choice
    choices: [Ensembl, GENCODE, RefSeq, UCSC, other]
  - key: annotation_version
    label: "Annotation version"
    required: false
    type: string
    hint: "e.g. Ensembl 105, GENCODE v39"
