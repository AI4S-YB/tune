file_types: [bam, sam]
label: "Alignment File (BAM/SAM)"

base_fields:
  - key: project
    label: "Project"
    required: true
    type: string
  - key: sample_id
    label: "Sample ID"
    required: true
    type: string
  - key: sample_type
    label: "Sample Type"
    required: true
    type: string
  - key: experiment_type
    label: "Experiment Type"
    required: true
    type: string
  - key: operator
    label: "Operator"
    required: false
    type: string
  - key: notes
    label: "Notes"
    required: false
    type: string

type_fields:
  - key: reference_genome
    label: "Reference genome version"
    required: true
    type: string
    hint: "e.g. hg38, hg19, mm10, GRCh38"
  - key: aligner
    label: "Aligner used"
    required: true
    type: choice
    choices: [STAR, BWA-MEM, BWA-MEM2, Bowtie2, HISAT2, minimap2, other]
  - key: is_deduped
    label: "PCR duplicates removed?"
    required: false
    type: boolean
  - key: sort_order
    label: "Sort order"
    required: false
    type: choice
    choices: [coordinate, queryname, unsorted]
