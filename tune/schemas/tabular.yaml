file_types: [csv, tsv, txt, excel]
label: "Tabular Data (count matrix / expression table)"

base_fields:
  - key: project
    label: "Project"
    required: true
    type: string
  - key: sample_id
    label: "Sample ID (or 'multiple' for count matrices)"
    required: true
    type: string
  - key: sample_type
    label: "Sample Type"
    required: false
    type: string
  - key: experiment_type
    label: "Experiment Type"
    required: true
    type: string
  - key: operator
    label: "Operator"
    required: false
    type: string
  - key: notes
    label: "Notes"
    required: false
    type: string

type_fields:
  - key: data_content
    label: "What does this table contain?"
    required: true
    type: choice
    choices: [raw count matrix, normalized expression, differential expression results,
              sample metadata, other]
  - key: gene_annotation
    label: "Gene annotation version (if applicable)"
    required: false
    type: string
    hint: "e.g. Ensembl 105, GENCODE 39"
  - key: count_tool
    label: "Quantification tool (if count matrix)"
    required: false
    type: choice
    choices: [featureCounts, HTSeq, RSEM, Salmon, kallisto, other]
  - key: normalization
    label: "Normalization method applied"
    required: false
    type: string
    hint: "e.g. none (raw), TPM, FPKM, DESeq2 normalized"
